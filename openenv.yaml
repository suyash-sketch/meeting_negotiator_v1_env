spec_version: 1
name: meeting_negotiator_v1
version: 1.0.0
description: >
  Multi-step calendar negotiation RL environment — agents must schedule meetings
  across timezones, manage priority bumps, respect deadlines and preferences,
  and handle protected-event escalations and recovery requests. 9 scenarios
  across 3 difficulty tiers with seed-based anti-memorization randomization.
type: space
runtime: fastapi
app: server.app:app
port: 8000
tags:
  - openenv
  - scheduling
  - calendar
  - real-world
  - negotiation

tasks:
  - id: "EASY"
    description: "Easy — The Empty Slate: single pending request, UTC participants, shared prefs."
    grader: server.graders.grade_easy
  - id: "EASY_B"
    description: "Easy — The Timezone Overlap: EST/PST overlap vs non-overlapping preferred windows."
    grader: server.graders.grade_easy
  - id: "EASY_C"
    description: "Easy — The Lunch Break Gap: tri-party with IST participant and lunch gap constraints."
    grader: server.graders.grade_easy
  - id: "MEDIUM"
    description: "Medium — The Greedy Preference Trap: multi-request handoff ordering and follow-ups."
    grader: server.graders.grade_medium
  - id: "MEDIUM_B"
    description: "Medium — The Blocker Sandwich: protected placeholder displacement and recovery work."
    grader: server.graders.grade_medium
  - id: "MEDIUM_C"
    description: "Medium — The Bump Chain: urgent placement bumps low-priority event and recovery task."
    grader: server.graders.grade_medium
  - id: "HARD"
    description: "Hard — The Zero-Sum Domino Cascade: dense cascade, partial observability, mid-episode inject."
    grader: server.graders.grade_hard
  - id: "HARD_B"
    description: "Hard — The 60-Minute VIP Bottleneck: protected CEO block, executive recovery sync."
    grader: server.graders.grade_hard
  - id: "HARD_C"
    description: "Hard — The Triple Threat Cascade: trap bump, multi-day recovery, inspection payoff."
    grader: server.graders.grade_hard
